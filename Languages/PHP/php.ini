;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; BASIC SETTINGS
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

memory_limit = -1
max_execution_time = 0
display_errors = On
error_reporting = E_ALL

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; EXTENSIONS
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

; Make sure extension_dir matches your system
; Check with: php -i | grep extension_dir
; Example:
; extension_dir = "/usr/lib/php/20230831"

extension=gmp
extension=sysvmsg
extension=sysvsem
extension=sysvshm

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; OPCACHE
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; JIT CONFIGURATION
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

; ===== JIT ENABLED =====
; Uncomment these to enable JIT

opcache.jit_buffer_size=128M
opcache.jit=tracing

; Alternative aggressive mode:
; opcache.jit=1235


; ===== JIT DISABLED =====
; To disable JIT, comment the two lines above
; and use this instead:

; opcache.jit_buffer_size=0
; opcache.jit=off
